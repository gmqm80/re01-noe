<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>神秘日期祝福</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Arial", sans-serif;
        background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%);
        height: 100vh;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        color: #333;
      }
      /* 卡片通用样式 */
      .card {
        background: rgba(255, 255, 255, 0.95);
        padding: 50px 30px;
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(123, 31, 162, 0.15);
        text-align: center;
        max-width: 500px;
        width: 90%;
        z-index: 10;
        transition: all 0.5s ease;
      }
      /* 日期选择界面 */
      .date-select h2 {
        color: #7b1fa2;
        font-size: 1.8rem;
        margin-bottom: 30px;
      }
      .select-group {
        display: flex;
        gap: 20px;
        justify-content: center;
        margin-bottom: 30px;
        flex-wrap: wrap;
      }
      select {
        padding: 12px 20px;
        border: 2px solid #e0c3fc;
        border-radius: 50px;
        font-size: 1.1rem;
        color: #555;
        background: #f8f5ff;
        cursor: pointer;
        outline: none;
        transition: border-color 0.3s ease;
        min-width: 120px;
      }
      select:focus {
        border-color: #8ec5fc;
      }
      /* 按钮样式 */
      .btn {
        background: linear-gradient(45deg, #7b1fa2, #2196f3);
        color: white;
        border: none;
        padding: 12px 35px;
        border-radius: 50px;
        font-size: 1.1rem;
        cursor: pointer;
        transition: all 0.3s ease;
        box-shadow: 0 5px 15px rgba(123, 31, 162, 0.2);
      }
      .btn:hover {
        transform: translateY(-3px);
        box-shadow: 0 8px 20px rgba(123, 31, 162, 0.3);
      }
      .btn:active {
        transform: translateY(1px);
      }
      /* 提示文字 */
      .tip {
        margin-top: 15px;
        font-size: 0.9rem;
        color: #888;
        height: 20px;
      }
      .error {
        color: #e53935;
      }
      /* 祝福界面（初始隐藏） */
      .blessing-card {
        display: none;
      }
      .blessing-card h1 {
        color: #7b1fa2;
        font-size: 2.2rem;
        margin-bottom: 25px;
        text-shadow: 2px 2px 4px rgba(123, 31, 162, 0.1);
      }
      .blessing-text {
        font-size: 1.1rem;
        line-height: 1.8;
        margin: 20px 0;
        color: #555;
      }
      /* 爱心背景元素 */
      .heart {
        position: absolute;
        width: 20px;
        height: 20px;
        background: #e0c3fc;
        transform: rotate(45deg);
        opacity: 0.7;
        animation: float 6s linear infinite;
        z-index: 1;
      }
      @keyframes float {
        0% {
          transform: rotate(45deg) translateY(100vh) scale(0.5);
          opacity: 0;
        }
        10% {
          opacity: 0.8;
        }
        90% {
          opacity: 0.8;
        }
        100% {
          transform: rotate(45deg) translateY(-20px) scale(1.2);
          opacity: 0;
        }
      }
      /* 点击爱心特效 */
      .click-heart {
        position: absolute;
        width: 30px;
        height: 30px;
        background: #9c27b0;
        transform: rotate(45deg);
        animation: pop 1s ease-out forwards;
        z-index: 5;
      }
      @keyframes pop {
        0% {
          transform: rotate(45deg) scale(1);
          opacity: 1;
        }
        100% {
          transform: rotate(45deg) scale(0.2) translateY(-50px);
          opacity: 0;
        }
      }
    </style>
  </head>
  <body>
    <!-- 生日快乐背景音乐 -->
    <audio id="birthdayMusic" preload="auto" loop="false">
      <source
        src="https://cdn.freesound.org/previews/501/501010_10226571-lq.mp3"
        type="audio/mpeg"
      />
      您的浏览器不支持音频播放
    </audio>

    <!-- 日期选择卡片 -->
    <div class="card date-select" id="dateSelectCard">
      <h2>今天是什么特别的日子？</h2>
      <div class="select-group">
        <select id="monthSelect">
          <option value="">选择月份</option>
          <option value="1">1月</option>
          <option value="2">2月</option>
          <option value="3">3月</option>
          <option value="4">4月</option>
          <option value="5">5月</option>
          <option value="6">6月</option>
          <option value="7">7月</option>
          <option value="8">8月</option>
          <option value="9">9月</option>
          <option value="10">10月</option>
          <option value="11">11月</option>
          <option value="12">12月</option>
        </select>
        <select id="daySelect">
          <option value="">选择日期</option>
          <!-- 动态生成日期选项（1-31） -->
        </select>
      </div>
      <button class="btn" id="checkBtn">确认</button>
      <div class="tip" id="tipText"></div>
    </div>

    <!-- 祝福卡片（初始隐藏） -->
    <div class="card blessing-card" id="blessingCard">
      <h1>🎂 生日快乐呀！🎂</h1>
      <div class="blessing-text">
        恭喜你解锁成功～<br /><br />
        愿你新的一岁：<br />
        眼里有光，心里有爱，<br />
        事事顺心，岁岁欢喜，<br />
        所有美好都如期而至！<br /><br />
        今天你是最亮的星，要一直快乐呀～✨
      </div>
      <button class="btn" id="replayBtn">再看一次</button>
    </div>

    <script>
      document.addEventListener("DOMContentLoaded", function () {
        // 已设置朋友生日：4月16日
        const BIRTH_MONTH = 4;
        const BIRTH_DAY = 16;

        // 1. 动态生成日期选项（1-31）
        const daySelect = document.getElementById("daySelect");
        for (let i = 1; i <= 31; i++) {
          const option = document.createElement("option");
          option.value = i;
          option.textContent = i + "日";
          daySelect.appendChild(option);
        }

        // 2. 元素获取与音乐配置
        const dateSelectCard = document.getElementById("dateSelectCard");
        const blessingCard = document.getElementById("blessingCard");
        const checkBtn = document.getElementById("checkBtn");
        const tipText = document.getElementById("tipText");
        const replayBtn = document.getElementById("replayBtn");
        const monthSelect = document.getElementById("monthSelect");
        const music = document.getElementById("birthdayMusic");
        let musicPlayed = false;

        // 3. 日期验证与界面切换
        checkBtn.addEventListener("click", () => {
          const selectedMonth = parseInt(monthSelect.value);
          const selectedDay = parseInt(daySelect.value);

          if (!selectedMonth || !selectedDay) {
            tipText.textContent = "请选择完整日期呀～";
            tipText.classList.add("error");
            return;
          }

          if (selectedMonth === BIRTH_MONTH && selectedDay === BIRTH_DAY) {
            tipText.textContent = "解锁成功！正在跳转...";
            tipText.classList.remove("error");
            // 播放生日快乐歌
            if (!musicPlayed) {
              music.play().catch((err) => {
                tipText.textContent = "点击页面继续播放音乐～";
                document.body.addEventListener("click", () => music.play(), {
                  once: true,
                });
              });
              musicPlayed = true;
            }
            setTimeout(() => {
              dateSelectCard.style.display = "none";
              blessingCard.style.display = "block";
            }, 1000);
          } else {
            tipText.textContent = "好像不是这个日子哦，再试试～";
            tipText.classList.add("error");
          }
        });

        // 4. 重新播放功能
        replayBtn.addEventListener("click", () => {
          blessingCard.style.display = "none";
          dateSelectCard.style.display = "block";
          monthSelect.value = "";
          daySelect.value = "";
          tipText.textContent = "";
          music.currentTime = 0;
          musicPlayed = false;
        });

        // 5. 背景爱心特效（持续飘洒）
        function createHearts() {
          const heart = document.createElement("div");
          heart.classList.add("heart");
          heart.style.left = Math.random() * 100 + "vw";
          const size = Math.random() * 15 + 10;
          heart.style.width = size + "px";
          heart.style.height = size + "px";
          heart.style.animationDuration = Math.random() * 5 + 3 + "s";
          heart.style.opacity = Math.random() * 0.5 + 0.3;
          const colors = [
            "#ff6b8b",
            "#ff8e53",
            "#ff4757",
            "#ff9f43",
            "#ff3838",
          ];
          heart.style.background =
            colors[Math.floor(Math.random() * colors.length)];

          document.body.appendChild(heart);
          setTimeout(() => heart.remove(), 8000);
        }
        setInterval(createHearts, 300);

        // 6. 点击屏幕生成爱心特效
        document.addEventListener("click", (e) => {
          if (!e.target.closest("select") && !e.target.closest("button")) {
            const clickHeart = document.createElement("div");
            clickHeart.classList.add("click-heart");
            clickHeart.style.left = e.clientX - 15 + "px";
            clickHeart.style.top = e.clientY - 15 + "px";
            document.body.appendChild(clickHeart);
            setTimeout(() => clickHeart.remove(), 1000);
          }
        });
      });
    </script>
  </body>
</html>
